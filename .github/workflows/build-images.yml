# Build → push the Comet Tail Crafts image to GHCR. Mirrors deadly's
# build-images: builds on push to main (when app/image inputs change) or on
# manual dispatch, tagging the image with the commit SHA (+ latest). Deploys are
# a separate step (deploy.yml) that promotes a pre-built SHA to an environment.
#
# The GHCR package must be public so the box can pull it (no registry auth,
# like deadly). A package pushed from this public repo inherits public access.

name: Build Images

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - docker-entrypoint.sh
      - src/**
      - prisma/**
      - public/**
      - package.json
      - package-lock.json
      - next.config.*
      - tsconfig.json
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        default: main
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve checked-out SHA
        id: ref
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ref.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          SHA="${{ steps.ref.outputs.sha }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Image Published

          | Image | Tag |
          |-------|-----|
          | \`${IMAGE}\` | \`${SHA}\` |

          Deploy with:
          \`\`\`
          gh workflow run deploy.yml -f environment=beta -f ref=${SHA}
          \`\`\`
          EOF
